apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fcs-developer-portal-data
  namespace: fcs-developer-portal
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fcs-developer-portal
  namespace: fcs-developer-portal
  labels:
    app.kubernetes.io/name: fcs-developer-portal
    backstage.io/kubernetes-id: fcs-developer-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fcs-developer-portal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fcs-developer-portal
        backstage.io/kubernetes-id: fcs-developer-portal
      annotations:
        secrets.infisical.com/auto-reload: 'true'
    spec:
      serviceAccountName: fcs-developer-portal
      containers:
        - name: fcs-developer-portal
          image: ghcr.io/group10-tc-01/fcs-developer-portal:sha-REPLACE_AT_DEPLOY
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7007
          envFrom:
            - secretRef:
                name: developer-portal-runtime
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: '1'
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: http
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: http
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: temporary
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: fcs-developer-portal-data
        - name: temporary
          emptyDir: {}
